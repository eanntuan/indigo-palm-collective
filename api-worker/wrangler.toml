name = "indigo-palm-api"
main = "index.js"
compatibility_date = "2024-01-01"

# Routes: intercept /api/* on indigopalm.co before GitHub Pages handles it
# Cloudflare must be proxying (orange cloud) for indigopalm.co DNS records
[[routes]]
pattern = "indigopalm.co/*"
zone_name = "indigopalm.co"

[[kv_namespaces]]
binding = "DISCOUNT_CODES"
id = "150397b0fcfc4772b72ec92b282872e2"

[[kv_namespaces]]
binding = "BOOKINGS"
id = "adf84125eb4b4a528e74f70fe721c057"

[triggers]
crons = ["0 9 * * *"]

# Secrets (set once via CLI — never stored in this file):
#   wrangler secret put ANTHROPIC_API_KEY      --name indigo-palm-api
#   wrangler secret put HOSTAWAY_CLIENT_ID     --name indigo-palm-api  (value: 45747)
#   wrangler secret put HOSTAWAY_CLIENT_SECRET --name indigo-palm-api
