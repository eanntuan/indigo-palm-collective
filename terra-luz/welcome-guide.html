<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Guide | Terra Luz</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Work+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f5f3ee;
            font-family: 'Work Sans', sans-serif;
            color: #2c2c2c;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            padding: 32px 40px;
            text-align: center;
            border-bottom: 1px solid rgba(44,44,44,0.1);
        }
        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.85rem;
            font-weight: 400;
            letter-spacing: 4px;
            color: #2c2c2c;
            text-decoration: none;
            display: block;
            margin-bottom: 8px;
        }
        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2rem;
            font-weight: 300;
            letter-spacing: 2px;
            margin-top: 24px;
        }
        .subtitle {
            font-size: 0.95rem;
            color: #777;
            margin-top: 8px;
            font-weight: 300;
        }
        .guide-container {
            flex: 1;
            padding: 40px;
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
        }
        .canva-embed {
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 24px rgba(0,0,0,0.1);
            position: relative;
            padding-top: 141%;
        }
        .canva-embed iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        .open-link {
            text-align: center;
            padding: 24px;
            font-size: 0.9rem;
            color: #888;
        }
        .open-link a {
            color: #B67550;
            text-decoration: none;
        }
        footer {
            text-align: center;
            padding: 32px;
            font-size: 0.8rem;
            color: #aaa;
            border-top: 1px solid rgba(44,44,44,0.1);
        }
        @media (max-width: 600px) {
            header { padding: 24px 20px; }
            .guide-container { padding: 24px 16px; }
        }
    </style>
</head>
<body>
    <header>
        <a href="/" class="logo">INDIGO PALM COLLECTIVE</a>
        <h1>TERRA LUZ</h1>
        <p class="subtitle">Welcome Guide</p>
    </header>

    <div class="guide-container">
        <div class="canva-embed">
            <iframe src="https://www.canva.com/design/DAFmpXMqQ2g/pl_RYPuVi4igxn8mEjFHOw/view?embed" allowfullscreen title="Terra Luz Welcome Guide"></iframe>
        </div>
        <div class="open-link">
            <a href="https://www.canva.com/design/DAFmpXMqQ2g/pl_RYPuVi4igxn8mEjFHOw/view" target="_blank">Open in full screen ↗</a>
        </div>
    </div>

    <footer>
        &copy; 2026 Indigo Palm Collective
    </footer>
</body>
</html>
