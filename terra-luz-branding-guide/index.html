<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="0; url=casa-moto-branding-guide.pdf">
    <title>Terra Luz Branding Guide | Indigo Palm Collective</title>
    <meta name="description" content="Terra Luz branding guide by Dawn Asher. Color palette, brand filters, and design identity for the Latin/Cuban-inspired desert rental in Indio, CA.">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Open Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #B67550 0%, #FEAD26 100%);
            color: #FAF8F5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 60px 40px;
            border-radius: 20px;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: #FAF8F5;
        }

        .emoji {
            font-size: 4rem;
            margin-bottom: 20px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        p {
            font-size: 1.2rem;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        .button {
            display: inline-block;
            background: #FAF8F5;
            color: #B67550;
            padding: 15px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        .meta {
            margin-top: 30px;
            font-size: 0.9rem;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="emoji">🎨</div>
        <h1>Terra Luz Branding Guide</h1>
        <p>The beacon for all design decisions</p>
        <p><small>By Dawn Asher | The Olive Jar | Feb 2026</small></p>

        <a href="casa-moto-branding-guide.pdf" class="button">
            📄 Open Branding Guide
        </a>

        <div class="meta">
            <p>6 Brand Filters • 7-Color Palette • Room-by-Room Specs • Instagram Moments</p>
        </div>
    </div>

    <script>
        // Auto-redirect after 2 seconds (or user can click button)
        setTimeout(function() {
            window.location.href = 'casa-moto-branding-guide.pdf';
        }, 2000);
    </script>
</body>
</html>
