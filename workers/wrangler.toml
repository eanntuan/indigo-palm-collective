[env.production]
name = "indigo-palm-newsletter"
compatibility_date = "2024-01-01"
main = "newsletter-signup.js"

# Environment variables (add these via Cloudflare Dashboard or wrangler secret)
# RESEND_API_KEY = "your-resend-api-key"
# SHEETS_WEBHOOK_URL = "your-google-apps-script-webhook-url"

# Routes - this worker will handle newsletter signups
routes = [
  { pattern = "newsletter.indigopalm.co/*", custom_domain = true }
]
