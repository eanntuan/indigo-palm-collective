name: Auto Pinterest Pins

on:
  push:
    branches: [main]
    paths:
      - 'content/blog/**.md'
  workflow_dispatch:
    inputs:
      slug:
        description: 'Blog post slug to pin (e.g. palm-springs-vs-scottsdale)'
        required: true
        default: 'palm-springs-vs-scottsdale'

jobs:
  pin:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: pinterest-automation/package.json

      - name: Install dependencies
        working-directory: pinterest-automation
        run: npm install

      - name: Install Chrome for Puppeteer
        run: npx puppeteer browsers install chrome
        working-directory: pinterest-automation

      - name: Find new blog posts
        id: new_posts
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            NEW="${{ github.event.inputs.slug }}"
          else
            NEW=$(git diff --name-only HEAD~1 HEAD -- 'content/blog/*.md' | grep -v '^$' | xargs -I{} basename {} .md | tr '\n' ' ')
          fi
          echo "slugs=$NEW" >> $GITHUB_OUTPUT
          echo "New posts: $NEW"

      - name: Generate and post pins
        if: steps.new_posts.outputs.slugs != ''
        working-directory: pinterest-automation
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
        run: |
          for slug in ${{ steps.new_posts.outputs.slugs }}; do
            echo "Processing: $slug"
            node run.js "$slug" || echo "Failed for $slug, continuing..."
          done
