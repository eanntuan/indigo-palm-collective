name: Scheduled Blog Publishing

on:
  schedule:
    # Runs daily at 8am PST (16:00 UTC)
    - cron: '0 16 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Check for scheduled posts to publish
        id: check
        run: |
          TODAY=$(date -u +"%Y-%m-%d")
          echo "Today is $TODAY"

          PUBLISHED=0

          # Look for HTML files in _scheduled/ that are due today or past due
          if [ -d "_scheduled" ]; then
            for file in _scheduled/*.html; do
              [ -f "$file" ] || continue
              # Extract date from filename: YYYY-MM-DD-slug.html
              BASENAME=$(basename "$file")
              FILE_DATE=$(echo "$BASENAME" | grep -oE '^[0-9]{4}-[0-9]{2}-[0-9]{2}')

              if [ -n "$FILE_DATE" ] && [ "$FILE_DATE" <= "$TODAY" ]; then
                SLUG=$(echo "$BASENAME" | sed "s/^${FILE_DATE}-//")
                echo "Publishing: $SLUG (scheduled for $FILE_DATE)"

                mv "$file" "blog/$SLUG"
                PUBLISHED=$((PUBLISHED + 1))
                echo "Moved $file → blog/$SLUG"
              fi
            done
          fi

          echo "published_count=$PUBLISHED" >> $GITHUB_OUTPUT

      - name: Commit and push published posts
        if: steps.check.outputs.published_count != '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blog/
          git add _scheduled/
          git commit -m "chore: auto-publish scheduled blog posts [$(date -u +%Y-%m-%d)]"
          git push

      - name: No posts to publish
        if: steps.check.outputs.published_count == '0'
        run: echo "No scheduled posts due today."
