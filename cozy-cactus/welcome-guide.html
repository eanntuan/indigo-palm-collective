<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Guide | The Cozy Cactus</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Work+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f5f3ee;
            font-family: 'Work Sans', sans-serif;
            color: #2c2c2c;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            padding: 28px 40px;
            text-align: center;
            border-bottom: 1px solid rgba(44,44,44,0.1);
        }
        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.75rem;
            letter-spacing: 4px;
            color: #2c2c2c;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 8px;
        }
        .logo:hover { color: #B67550; }
        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.8rem;
            font-weight: 300;
            letter-spacing: 2px;
        }
        h1 a { color: inherit; text-decoration: none; }
        h1 a:hover { color: #B67550; }
        .subtitle { font-size: 0.85rem; color: #888; margin-top: 4px; }
        .guide-container {
            flex: 1;
            padding: 40px;
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
        }
        .canva-embed {
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 24px rgba(0,0,0,0.1);
            position: relative;
            padding-top: 141%;
        }
        .canva-embed iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: none;
        }
        .open-link {
            text-align: center;
            padding: 20px;
            font-size: 0.85rem;
            color: #aaa;
        }
        .open-link a { color: #B67550; text-decoration: none; }
        footer {
            text-align: center;
            padding: 28px;
            font-size: 0.8rem;
            color: #aaa;
            border-top: 1px solid rgba(44,44,44,0.1);
        }

        /* Popup */
        .popup-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .popup-overlay.active { display: flex; }
        .popup {
            background: #fff;
            border-radius: 12px;
            padding: 48px 40px;
            max-width: 440px;
            width: 100%;
            text-align: center;
            position: relative;
        }
        .popup-close {
            position: absolute;
            top: 16px; right: 20px;
            font-size: 1.4rem;
            cursor: pointer;
            color: #aaa;
            background: none;
            border: none;
            line-height: 1;
        }
        .popup h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.6rem;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 12px;
        }
        .popup p {
            font-size: 0.9rem;
            color: #666;
            line-height: 1.7;
            margin-bottom: 28px;
        }
        .popup-form {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .popup-form input {
            padding: 13px 16px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: 'Work Sans', sans-serif;
            font-size: 0.9rem;
            outline: none;
        }
        .popup-form input:focus { border-color: #B67550; }
        .popup-form button {
            padding: 13px;
            background: #B67550;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-family: 'Work Sans', sans-serif;
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 1.5px;
            cursor: pointer;
        }
        .popup-form button:hover { background: #9d6143; }
        .popup-skip {
            margin-top: 14px;
            font-size: 0.78rem;
            color: #aaa;
            cursor: pointer;
        }
        .popup-skip:hover { color: #777; }
        .popup-success { display: none; }
        .popup-success p { color: #5a7a50; font-size: 0.95rem; margin: 0; }

        @media (max-width: 600px) {
            header { padding: 20px; }
            .guide-container { padding: 20px 16px; }
            .popup { padding: 40px 24px; }
        }
    </style>
</head>
<body>
    <header>
        <a href="https://indigopalm.co" class="logo">INDIGO PALM COLLECTIVE</a>
        <h1><a href="https://indigopalm.co">THE COZY CACTUS</a></h1>
        <p class="subtitle">Welcome Guide</p>
    </header>

    <div class="guide-container">
        <div class="canva-embed">
            <iframe src="https://www.canva.com/design/DAFfWdYcJDI/GAOJJNmQASKJYJofg9gzyg/view?embed" allowfullscreen title="Cozy Cactus Welcome Guide" loading="lazy"></iframe>
        </div>
        <div class="open-link">
            <a href="https://bit.ly/cc-welcome-guide" target="_blank">Open in full screen ↗</a>
        </div>
    </div>

    <footer>&copy; 2026 Indigo Palm Collective</footer>

    <!-- Email Popup -->
    <div class="popup-overlay" id="popupOverlay">
        <div class="popup">
            <button class="popup-close" id="popupClose">&times;</button>
            <h2>COME BACK SOON</h2>
            <p>Get early access to availability, last-minute deals, and 10% off your next direct booking.</p>
            <div class="popup-success" id="popupSuccess">
                <p>You're in. See you next time.</p>
            </div>
            <form class="popup-form" id="popupForm">
                <input type="text" name="firstName" placeholder="First name" required>
                <input type="email" name="email" placeholder="Email address" required>
                <button type="submit" id="popupBtn">SAVE MY SPOT</button>
            </form>
            <p class="popup-skip" id="popupSkip">No thanks</p>
        </div>
    </div>

    <script>
        // Show popup after 30 seconds
        setTimeout(() => {
            document.getElementById('popupOverlay').classList.add('active');
        }, 30000);

        document.getElementById('popupClose').addEventListener('click', () => {
            document.getElementById('popupOverlay').classList.remove('active');
        });
        document.getElementById('popupSkip').addEventListener('click', () => {
            document.getElementById('popupOverlay').classList.remove('active');
        });

        document.getElementById('popupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('popupBtn');
            btn.disabled = true;
            btn.textContent = 'SAVING...';
            const email = e.target.querySelector('input[name="email"]').value;
            try {
                await fetch('https://newsletter.indigopalm.co/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                document.getElementById('popupForm').style.display = 'none';
                document.getElementById('popupSkip').style.display = 'none';
                document.getElementById('popupSuccess').style.display = 'block';
                setTimeout(() => {
                    document.getElementById('popupOverlay').classList.remove('active');
                }, 2500);
            } catch (err) {
                btn.disabled = false;
                btn.textContent = 'SAVE MY SPOT';
            }
        });
    </script>
</body>
</html>
