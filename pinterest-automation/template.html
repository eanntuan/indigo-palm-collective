<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Work+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1000px;
    height: 1500px;
    background: #F6F1E9;
    font-family: 'Work Sans', Georgia, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
    position: relative;
  }

  .photo-frame {
    width: 928px;
    height: 780px;
    margin: 36px auto 0;
    border-radius: 14px;
    overflow: hidden;
    border: 2px solid #DDD8CC;
    flex-shrink: 0;
  }

  .photo-frame img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    display: block;
  }

  .logo-wrap {
    margin: 32px auto 24px;
    flex-shrink: 0;
  }

  .logo-wrap img {
    width: 64px;
    height: 64px;
    display: block;
  }

  .title {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: {{TITLE_SIZE}}px;
    font-weight: 400;
    color: #1E1E1E;
    text-align: center;
    line-height: 1.15;
    padding: 0 64px;
    max-width: 1000px;
  }

  .divider {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-style: italic;
    font-size: 32px;
    font-weight: 300;
    color: #B67550;
    margin: 16px 0 12px;
    flex-shrink: 0;
  }

  .subtitle {
    font-family: 'Work Sans', sans-serif;
    font-size: 24px;
    font-weight: 300;
    color: #666;
    text-align: center;
    padding: 0 80px;
    line-height: 1.5;
    max-width: 1000px;
  }

  .domain {
    position: absolute;
    bottom: 28px;
    left: 0;
    right: 0;
    text-align: center;
    font-family: 'Work Sans', sans-serif;
    font-size: 20px;
    font-weight: 400;
    color: #AAA49A;
    letter-spacing: 0.06em;
  }
</style>
</head>
<body>

  <div class="photo-frame">
    <img src="{{HERO_IMAGE}}" alt="">
  </div>

  <div class="logo-wrap">
    <img src="{{LOGO_SRC}}" alt="Indigo Palm Collective">
  </div>

  <div class="title">{{TITLE}}</div>
  <div class="divider">~</div>
  <div class="subtitle">{{SUBTITLE}}</div>

  <div class="domain">www.indigopalm.co</div>

</body>
</html>
